version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: rentflow-api
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql://rentflow:rentflow_password@mysql:3306/rentflow}
      JWT_SECRET: ${JWT_SECRET:-rentflow-super-secret-jwt-key-change-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: npm run start:dev
    networks:
      - rentflow-network

  mysql:
    image: mysql:8.0
    container_name: rentflow-mysql
    restart: unless-stopped
    ports:
      - '${MYSQL_PORT:-3306}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DB:-rentflow}
      MYSQL_USER: ${MYSQL_USER:-rentflow}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rentflow_password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-prootpassword']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rentflow-network

  adminer:
    image: adminer:latest
    container_name: rentflow-adminer
    restart: unless-stopped
    ports:
      - '${ADMINER_PORT:-8080}:8080'
    depends_on:
      - mysql
    networks:
      - rentflow-network

volumes:
  mysql_data:

networks:
  rentflow-network:
    driver: bridge
