version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: rentflow-api
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://rentflow:rentflow_password@postgres:5432/rentflow}
      JWT_SECRET: ${JWT_SECRET:-rentflow-super-secret-jwt-key-change-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: npm run start:dev
    networks:
      - rentflow-network

  postgres:
    image: postgres:15-alpine
    container_name: rentflow-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rentflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rentflow_password}
      POSTGRES_DB: ${POSTGRES_DB:-rentflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-rentflow} -d ${POSTGRES_DB:-rentflow}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rentflow-network

  adminer:
    image: adminer:latest
    container_name: rentflow-adminer
    restart: unless-stopped
    ports:
      - '${ADMINER_PORT:-8080}:8080'
    depends_on:
      - postgres
    networks:
      - rentflow-network

volumes:
  postgres_data:

networks:
  rentflow-network:
    driver: bridge
